apiVersion: v1
kind: ConfigMap
metadata:
  name: client-stack-postgres
  labels:
    app.kubernetes.io/name: client-stack
    app.kubernetes.io/instance: client-stack
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: client-stack-0.1.0
data:
  POSTGRES_DB: "clientsdb"
  POSTGRES_USER: "clientsapp"
