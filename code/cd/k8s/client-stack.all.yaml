---
# Source: client-stack/templates/api-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: client-stack-api
  labels:
    app.kubernetes.io/name: client-stack
    app.kubernetes.io/instance: client-stack
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: client-stack-0.1.0
data:
  DB_HOST: "client-stack-postgres"
  DB_PORT: "5432"
  DB_NAME: "clientsdb"
  DB_USER: "clientsapp"
  DB_POOL_MAX_SIZE: "20"
  DB_POOL_MIN_SIZE: "2"
