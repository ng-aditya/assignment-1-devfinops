{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgresSecretName | quote }}
  labels:
    {{- include "client-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Only use this if you explicitly set secrets.create=true and pass the secret value via Helm.
  POSTGRES_PASSWORD: {{ required "Set .Values.postgres.password when secrets.create=true" .Values.postgres.password | quote }}
{{- end }}

