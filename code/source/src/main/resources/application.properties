quarkus.http.root-path=/api/service

# Virtual threads for request handling
quarkus.virtual-threads.enabled=true

# Datasource (configured via env vars / ConfigMap / Secret)
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:postgres}
quarkus.datasource.username=${DB_USER:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:20}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}

# Flyway manages schema + seed data
quarkus.flyway.migrate-at-start=true

# Health/readiness used for rolling updates + self-healing
#quarkus.smallrye-health.root-path=/q/health

quarkus.otel.enabled=true
quarkus.otel.traces.exporter=none
quarkus.otel.logs.exporter=none
quarkus.otel.metrics.exporter=none
